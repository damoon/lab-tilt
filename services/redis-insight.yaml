apiVersion: v1
kind: Service
metadata:
  name: redis-insight
spec:
  ports:
    - name: ui
      port: 8001
  selector:
    app: redis-insight
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-insight
spec:
  selector:
    matchLabels:
        app: redis-insight
  strategy:
    type: Recreate
  replicas: 1
  template:
    metadata:
      labels:
        app: redis-insight
    spec:
      containers:
        - name: redis-insight
          image: redislabs/redisinsight@sha256:052927760bf7410688e7fd9e217d629d8ae88fb8a63f5cbb58ff21bffa864ca4
          ports:
            - name: ui
              containerPort: 8001
          readinessProbe:
            httpGet:
              path: /healthcheck/
              port: 8001
